services:
  postgres:
    image: postgres:16-alpine
    container_name: fatia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fatia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fatia_dev}
      # Cria a database principal. A database do Logto é criada via init script.
      POSTGRES_DB: ${POSTGRES_DB:-fatia}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fatia_pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fatia}"]
      interval: 5s
      timeout: 3s
      retries: 10

  logto:
    # Pinned: :latest pulls cloud-tracking builds that can ship breaking auth-console changes.
    # 1.39.0 tem bug conhecido em OSS: admin criado pelo signup não recebe o role
    # `Logto Management API access` no tenant default → console abre mas todas as
    # chamadas a /api/* retornam 401. 1.36.0 é estável.
    image: svhd/logto:1.36.0
    container_name: fatia-logto
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Conexão à database dedicada do Logto (criada pelo postgres-init/01-create-logto-db.sh)
      DB_URL: postgresql://${POSTGRES_USER:-fatia}:${POSTGRES_PASSWORD:-fatia_dev}@postgres:5432/logto
      # URLs públicas. Em local mantemos os defaults do Logto (3001 OIDC, 3002 admin)
      # pra evitar mismatch entre o admin SPA e a Management API. Em prod o Dokploy
      # injeta os subdomínios reais e TRUST_PROXY_HEADER=1 (override via env).
      ENDPOINT: ${LOGTO_ENDPOINT:-http://localhost:3001}
      ADMIN_ENDPOINT: ${LOGTO_ADMIN_ENDPOINT:-http://localhost:3002}
      TRUST_PROXY_HEADER: ${LOGTO_TRUST_PROXY:-0}
    ports:
      # Defaults do Logto: 3001 OIDC público, 3002 console admin. NÃO desloque
      # (o admin SPA tem URLs codificadas com esses ports internos).
      - "${LOGTO_PORT:-3001}:3001"
      - "${LOGTO_ADMIN_PORT:-3002}:3002"
    # `db seed --swe` (idempotente) cria schema + seed software-engineer (necessário
    # pros admin roles serem assinados corretamente). Primeira execução ~30s.
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    container_name: fatia-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      logto:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fatia}:${POSTGRES_PASSWORD:-fatia_dev}@postgres:5432/${POSTGRES_DB:-fatia}
      # Auth via Logto (ADR 008)
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT}
      LOGTO_AUDIENCE: ${LOGTO_AUDIENCE}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3030}
      PORT: 3000
    ports:
      - "${API_PORT:-3000}:3000"
    profiles: ["full"]

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    container_name: fatia-web
    restart: unless-stopped
    depends_on:
      - api
      - logto
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      # Logto SDK no Next.js
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT}
      LOGTO_APP_ID: ${LOGTO_APP_ID}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET}
      LOGTO_BASE_URL: ${LOGTO_BASE_URL:-http://localhost:3030}
      PORT: 3030
    ports:
      - "${WEB_PORT:-3030}:3030"
    profiles: ["full"]

volumes:
  fatia_pg_data:
    name: fatia_pg_data
