name: Sync labels

# Syncs GitHub labels from `.github/labels.yml`.
#
# - Runs automatically when `.github/labels.yml` changes on `main`.
# - Can also be triggered manually from the Actions tab.
# - `delete-other-labels: true` removes any label NOT defined in the YAML,
#   making the file the single source of truth.

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yml
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  sync:
    name: Sync labels from labels.yml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: true
